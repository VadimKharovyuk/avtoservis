<!DOCTYPE html>
<html lang="cs" xmlns:th="http://www.thymeleaf.org" th:lang="${currentLang.code}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="#{services.page.title} + ' | EN-motors'">Služby | EN-motors</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <link rel="stylesheet" th:href="@{/css/mavMain.css}">
  <link rel="stylesheet" th:href="@{/css/servicesList.css}">

  <style>
    /* ── Page Background ── */
    .sp-page {
      background: #0a0a0a;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }
    .sp-page::before {
      content: '';
      position: absolute;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(circle, rgba(249,115,22,0.05) 0%, transparent 70%);
      filter: blur(60px);
      pointer-events: none;
    }

    /* ── Back Link ── */
    .sp-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,.5);
      text-decoration: none;
      font-size: .9rem;
      font-weight: 500;
      transition: color .3s;
    }
    .sp-back:hover {
      color: #f97316;
    }

    /* ── Page Header ── */
    .sp-header {
      text-align: center;
      padding: 2rem 0 1rem;
    }
    .sp-header h1 {
      font-size: 2.4rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }
    .sp-header p {
      color: rgba(255,255,255,.5);
      font-size: 1.1rem;
      max-width: 560px;
      margin: .75rem auto 0;
    }

    /* ── Card ── */
    .sp-card {
      background: #141414;
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 16px;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .sp-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #f97316, transparent);
      opacity: 0;
      transition: opacity 0.4s;
      z-index: 1;
    }
    .sp-card:hover {
      border-color: rgba(249,115,22,.2);
      transform: translateY(-6px);
      box-shadow: 0 20px 60px rgba(0,0,0,.4), 0 0 40px rgba(249,115,22,.06);
    }
    .sp-card:hover::before {
      opacity: 1;
    }

    /* Card Image */
    .sp-card-img {
      position: relative;
      height: 180px;
      overflow: hidden;
      background: rgba(255,255,255,.02);
    }
    .sp-card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.85;
      transition: all .4s ease;
    }
    .sp-card:hover .sp-card-img img {
      transform: scale(1.05);
      opacity: 1;
    }
    .sp-card-img-ph {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: rgba(255,255,255,.1);
      font-size: 3rem;
    }

    /* Card Body */
    .sp-card-body {
      padding: 28px 24px 24px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    /* Category Badge */
    .sp-cat {
      font-size: .72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
      padding: .25rem .75rem;
      border-radius: 20px;
      display: inline-block;
      width: fit-content;
      margin-bottom: .75rem;
    }
    .sp-cat-service {
      background: rgba(249,115,22,.12);
      color: #f97316;
    }
    .sp-cat-other {
      background: rgba(99,102,241,.12);
      color: #818cf8;
    }

    .sp-card-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: #f5f5f5;
      letter-spacing: -0.3px;
      margin-bottom: .5rem;
    }

    .sp-card-desc {
      color: rgba(255,255,255,.45);
      font-size: .88rem;
      line-height: 1.6;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Price */
    .sp-price {
      font-size: 1.1rem;
      font-weight: 700;
      color: #f97316;
      margin-bottom: 1rem;
    }
    .sp-price .sp-price-from {
      font-size: .75rem;
      font-weight: 500;
      color: rgba(255,255,255,.4);
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .sp-price .sp-price-cur {
      font-size: .85rem;
      font-weight: 500;
      color: rgba(249,115,22,.7);
      margin-left: 2px;
    }

    /* Card Buttons */
    .sp-btn-outline {
      background: transparent;
      color: rgba(255,255,255,.65);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 8px;
      padding: 8px 16px;
      font-size: .8rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s;
      text-align: center;
    }
    .sp-btn-outline:hover {
      color: #f5f5f5;
      border-color: rgba(255,255,255,.25);
      background: rgba(255,255,255,.05);
    }
    .sp-btn-accent {
      background: #f97316;
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: .8rem;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.3s;
      text-align: center;
    }
    .sp-btn-accent:hover {
      background: #ea580c;
      color: #000;
      box-shadow: 0 4px 16px rgba(249,115,22,.3);
    }

    /* ── Fade-in ── */
    .sp-fade {
      opacity: 0;
      transform: translateY(20px);
      animation: spFadeUp .6s ease forwards;
    }
    .sp-fade-d1 { animation-delay: .1s; }
    .sp-fade-d2 { animation-delay: .2s; }
    .sp-fade-d3 { animation-delay: .3s; }
    .sp-fade-d4 { animation-delay: .4s; }

    @keyframes spFadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Empty State ── */
    .sp-empty {
      text-align: center;
      padding: 4rem 1rem;
      color: rgba(255,255,255,.35);
    }
    .sp-empty i {
      font-size: 3rem;
      margin-bottom: 1rem;
      display: block;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="sp-page">
  <div class="container py-5">

    <!-- Back -->
    <a th:href="@{'/' + ${currentLang.code}}"
       class="sp-back mb-4 d-inline-flex sp-fade">
      <i class="bi bi-arrow-left"></i>
      <span th:text="#{services.back}">Zpět na hlavní stránku</span>
    </a>

    <!-- Header -->
    <div class="sp-header sp-fade sp-fade-d1">
      <h1 th:text="#{services.heading}">Naše služby</h1>
      <p th:text="#{services.subheading}">Kompletní péče o váš vůz — od diagnostiky po generální opravu</p>
    </div>

    <!-- Services Grid -->
    <div class="row g-4 mt-2" th:if="${!services.isEmpty()}">
      <div class="col-md-6 col-lg-4 sp-fade"
           th:each="service, stat : ${services}"
           th:classappend="'sp-fade-d' + ${(stat.index % 4) + 1}">

        <div class="sp-card">

          <!-- Image -->
          <div class="sp-card-img">
            <img th:if="${service.imageUrl != null}"
                 th:src="${service.imageUrl}"
                 th:alt="${service.imageAlt}"
                 loading="lazy">
            <div th:unless="${service.imageUrl != null}" class="sp-card-img-ph">
              <i class="bi bi-wrench-adjustable"></i>
            </div>
          </div>

          <!-- Body -->
          <div class="sp-card-body">

            <span class="sp-cat"
                  th:classappend="${service.category.name() == 'AUTO_SERVICE' ? 'sp-cat-service' : 'sp-cat-other'}"
                  th:text="${service.categoryDisplayName}">Auto servis</span>

            <h2 class="sp-card-title" th:text="${service.name}">Název služby</h2>

<!--            <p class="sp-card-desc"-->
<!--               th:if="${service.description}"-->
<!--               th:utext="${service.description}">Popis služby...</p>-->

            <!-- Price -->
            <div class="sp-price" th:if="${service.price != null}">
              <span th:if="${service.priceFrom}" class="sp-price-from" th:text="#{detail.priceFrom}">od</span>
              <span th:text="${#numbers.formatDecimal(service.price, 0, 'COMMA', 0, 'POINT')}">1 200</span>
              <span class="sp-price-cur">Kč</span>
            </div>

            <!-- Buttons -->
            <div class="mt-auto d-flex gap-2">
              <a th:href="@{'/' + ${currentLang.code} + '/sluzby/' + ${service.slug}}"
                 class="sp-btn-outline flex-fill">
                <i class="bi bi-info-circle me-1"></i>
                <span th:text="#{services.btn.details}">Détails</span>
              </a>
              <a th:href="@{'/' + ${currentLang.code} + '/objednat?service=' + ${service.id}}"
                 class="sp-btn-accent flex-fill">
                <i class="bi bi-calendar-check me-1"></i>
                <span th:text="#{services.btn.book}">Objednat</span>
              </a>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- Empty State -->
    <div th:if="${services.isEmpty()}" class="sp-empty sp-fade sp-fade-d1">
      <i class="bi bi-inbox"></i>
      <p th:text="#{services.empty}">Zatím nejsou k dispozici žádné služby.</p>
    </div>

  </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
