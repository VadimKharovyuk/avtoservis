<!DOCTYPE html>
<html lang="cs" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${service.metaTitle != null ? service.metaTitle : service.name} + ' | EN-motors'">Služba | EN-motors</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .card { border: none; border-radius: .75rem; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
        .service-img {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: .75rem .75rem 0 0;
        }
        .img-placeholder {
            width: 100%;
            height: 240px;
            background: #e9ecef;
            border-radius: .75rem .75rem 0 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .price-tag {
            font-size: 1.75rem;
            font-weight: 700;
            color: #1e293b;
        }
    </style>

</head>
<body>

<div class="container py-5" style="max-width: 800px;">

    <!-- Назад -->
    <div class="mb-4">
        <a href="/" class="text-decoration-none text-muted">
            <i class="bi bi-arrow-left me-1"></i> Zpět na hlavní stránku
        </a>
    </div>

    <div class="card">
        <!-- Фото -->
        <img th:if="${service.imageUrl != null}"
             th:src="${service.imageUrl}"
             th:alt="${service.imageAlt}"
             class="service-img">
        <div th:unless="${service.imageUrl != null}" class="img-placeholder">
            <i class="bi bi-image text-muted" style="font-size: 3rem;"></i>
        </div>

        <div class="card-body p-4 p-md-5">
            <!-- Категорія -->
            <span class="badge rounded-pill mb-3"
                  th:classappend="${service.category.name() == 'AUTO_SERVICE' ? 'bg-primary-subtle text-primary' : 'bg-warning-subtle text-warning'}"
                  th:text="${service.categoryDisplayName}"></span>

            <!-- Назва -->
            <h2 class="fw-bold mb-3" th:text="${service.name}"></h2>

            <!-- Ціна -->
            <div class="mb-4">
                <span th:if="${service.priceFrom}" class="text-muted fs-5">od </span>
                <span class="price-tag" th:text="${#numbers.formatDecimal(service.price, 0, 'COMMA', 0, 'POINT')}"></span>
                <span class="text-muted fs-5"> Kč</span>
                <span class="text-muted small ms-2">(bez DPH)</span>
            </div>

            <!-- Опис -->
            <div th:if="${service.description}" class="mb-4">
                <p class="text-muted lh-lg" th:text="${service.description}"></p>
            </div>

            <!-- Переваги -->
            <div class="bg-light rounded-3 p-3 mb-4">
                <div class="row g-2 text-center">
                    <div class="col-4">
                        <i class="bi bi-clock text-primary fs-5"></i>
                        <div class="small mt-1">Ihned bez objednání</div>
                    </div>
                    <div class="col-4">
                        <i class="bi bi-shield-check text-primary fs-5"></i>
                        <div class="small mt-1">Záruka na práci</div>
                    </div>
                    <div class="col-4">
                        <i class="bi bi-tools text-primary fs-5"></i>
                        <div class="small mt-1">Všechny značky</div>
                    </div>
                </div>
            </div>

            <!-- Кнопки -->
            <div class="d-flex gap-3">
                <a th:href="@{/objednat(service=${service.id})}"
                   class="btn btn-primary btn-lg flex-fill">
                    <i class="bi bi-calendar-check me-1"></i> Objednat termín
                </a>
                <a href="tel:+420776485550"
                   class="btn btn-outline-secondary btn-lg flex-fill">
                    <i class="bi bi-telephone me-1"></i> Zavolat
                </a>
            </div>
        </div>
    </div>

    <!-- Інфо блок -->
    <div class="card mt-4">
        <div class="card-body p-4">
            <div class="row g-3">
                <div class="col-md-4 d-flex align-items-center gap-2">
                    <i class="bi bi-geo-alt text-primary fs-5"></i>
                    <div>
                        <div class="small text-muted">Adresa</div>
                        <div class="small fw-semibold">Cejl 76, 3. nádvoří, Brno</div>
                    </div>
                </div>
                <div class="col-md-4 d-flex align-items-center gap-2">
                    <i class="bi bi-clock text-primary fs-5"></i>
                    <div>
                        <div class="small text-muted">Otevírací doba</div>
                        <div class="small fw-semibold">Po–Pá 8–18, So 9–14</div>
                    </div>
                </div>
                <div class="col-md-4 d-flex align-items-center gap-2">
                    <i class="bi bi-telephone text-primary fs-5"></i>
                    <div>
                        <div class="small text-muted">Telefon</div>
                        <a href="tel:+420776485550" class="small fw-semibold text-decoration-none">+420 776 485 550</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
