<!DOCTYPE html>
<html lang="cs" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Objednat službu | EN-motors</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .card { border: none; border-radius: .75rem; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
    </style>
</head>
<body>

<div class="container py-5" style="max-width: 640px;">

    <div class="mb-4">
        <a href="/" class="text-decoration-none text-muted">
            <i class="bi bi-arrow-left me-1"></i> Zpět na hlavní stránku
        </a>
    </div>

    <div class="card">
        <div class="card-body p-4">
            <h4 class="fw-bold mb-1">Objednat službu</h4>
            <p class="text-muted mb-4">Vyplňte formulář a budeme vás kontaktovat do 15 minut</p>

            <form th:action="@{/objednat}"
                  th:object="${contactRequest}"
                  method="post">

                <!-- Ім'я -->
                <div class="mb-3">
                    <label for="name" class="form-label">Jméno</label>
                    <input type="text" class="form-control" id="name"
                           th:field="*{name}"
                           placeholder="Jan Novák">
                </div>

                <!-- Телефон -->
                <div class="mb-3">
                    <label for="phone" class="form-label">Telefon <span class="text-danger">*</span></label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                        <input type="tel" class="form-control" id="phone"
                               th:field="*{phone}"
                               th:classappend="${#fields.hasErrors('phone') ? 'is-invalid' : ''}"
                               placeholder="+420 777 123 456">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
                    </div>
                </div>

                <!-- Послуга -->
                <div class="mb-3">
                    <label for="serviceItemId" class="form-label">Služba</label>
                    <select class="form-select" id="serviceItemId" th:field="*{serviceItemId}">
                        <option value="">— Vyberte službu —</option>
                        <option th:each="s : ${services}"
                                th:value="${s.id}"
                                th:text="${s.name + ' — ' + (s.priceFrom ? 'od ' : '') + s.price + ' Kč'}"></option>
                    </select>
                </div>

                <!-- Дата та час запису -->
                <div class="mb-3">
                    <label for="appointmentDate" class="form-label">Preferovaný termín <span class="text-danger">*</span></label>
                    <input type="datetime-local" class="form-control" id="appointmentDate"
                           th:field="*{appointmentDate}"
                           th:classappend="${#fields.hasErrors('appointmentDate') ? 'is-invalid' : ''}">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('appointmentDate')}" th:errors="*{appointmentDate}"></div>
                    <div class="form-text">Po — Pá: 8:00–18:00, So: 9:00–14:00</div>
                </div>

                <!-- Повідомлення -->
                <div class="mb-4">
                    <label for="message" class="form-label">Poznámka</label>
                    <textarea class="form-control" id="message"
                              th:field="*{message}"
                              rows="3"
                              placeholder="Popište problém nebo požadavek..."></textarea>
                </div>

                <!-- Прихований тип заявки -->
                <input type="hidden" th:field="*{requestType}">

                <button type="submit" class="btn btn-primary w-100 py-2">
                    <i class="bi bi-send me-1"></i> Odeslat objednávku
                </button>
            </form>
        </div>
    </div>

    <p class="text-center text-muted small mt-3">
        <i class="bi bi-shield-check me-1"></i>
        Vaše údaje zpracováváme pouze za účelem kontaktování
    </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Мінімальна дата — завтра 8:00
    const now = new Date();
    now.setDate(now.getDate() + 1);
    now.setHours(8, 0, 0, 0);
    document.getElementById('appointmentDate').min = now.toISOString().slice(0, 16);
</script>
</body>
</html>
