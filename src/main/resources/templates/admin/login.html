<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід | EN-motors Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background: #1e293b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            border: none;
            border-radius: 1rem;
            box-shadow: 0 8px 32px rgba(0,0,0,.2);
        }
    </style>
</head>
<body>

<div class="card login-card">
    <div class="card-body p-5">
        <!-- Логотип -->
        <div class="text-center mb-4">
            <div class="d-inline-flex align-items-center justify-content-center rounded-circle bg-primary-subtle mb-3"
                 style="width: 64px; height: 64px;">
                <i class="bi bi-wrench-adjustable fs-3 text-primary"></i>
            </div>
            <h5 class="fw-bold mb-1">EN-motors</h5>
            <p class="text-muted small">Вхід в панель керування</p>
        </div>

        <!-- Помилка -->
        <div th:if="${error}" class="alert alert-danger py-2 small" role="alert">
            <i class="bi bi-exclamation-triangle me-1"></i>
            <span th:text="${error}"></span>
        </div>

        <!-- Форма -->
        <form method="post" th:action="@{/admin/login}">
            <div class="mb-3">
                <label for="username" class="form-label small fw-semibold">Логін</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="username"
                           name="username" placeholder="admin" required autofocus>
                </div>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label small fw-semibold">Пароль</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="password"
                           name="password" placeholder="••••••" required>
                    <button class="btn btn-outline-secondary" type="button" id="togglePass">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-box-arrow-in-right me-1"></i> Увійти
            </button>
        </form>

        <div class="text-center mt-4">
            <a href="/" class="text-muted small text-decoration-none">
                <i class="bi bi-arrow-left me-1"></i> На головну
            </a>
        </div>
    </div>
</div>

<script>
    document.getElementById('togglePass').addEventListener('click', function() {
        const input = document.getElementById('password');
        const icon = this.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.className = 'bi bi-eye-slash';
        } else {
            input.type = 'password';
            icon.className = 'bi bi-eye';
        }
    });
</script>
</body>
</html>
