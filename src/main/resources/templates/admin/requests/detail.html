<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заявка | EN-motors Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .card { border: none; border-radius: .75rem; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
        .badge-new { background: #dbeafe; color: #1e40af; }
        .badge-progress { background: #fef3c7; color: #92400e; }
        .badge-done { background: #dcfce7; color: #166534; }
        .info-label { color: #64748b; font-size: .85rem; margin-bottom: .15rem; }
        .info-value { font-weight: 500; }
    </style>
</head>
<body>

<div class="container py-4" style="max-width: 800px;">

    <!-- Flash повідомлення -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle me-1"></i> <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Заголовок -->
    <div class="d-flex align-items-center justify-content-between mb-4">
        <div class="d-flex align-items-center">
            <a href="/admin/requests" class="btn btn-light me-3">
                <i class="bi bi-arrow-left"></i>
            </a>
            <div>
                <h4 class="mb-0 fw-bold" th:text="'Заявка #' + ${request.id}"></h4>
                <small class="text-muted"
                       th:text="${#temporals.format(request.createdAt, 'dd.MM.yyyy HH:mm')}"></small>
            </div>
        </div>
        <!-- Поточний статус -->
        <span class="badge fs-6"
              th:classappend="${request.status.name() == 'NEW' ? 'badge-new' :
                               (request.status.name() == 'IN_PROGRESS' ? 'badge-progress' : 'badge-done')}"
              th:text="${request.statusDisplayName}"></span>
    </div>

    <div class="row g-4">

        <!-- Ліва колонка — інформація -->
        <div class="col-lg-8">

            <!-- Контакт -->
            <div class="card">
                <div class="card-body p-4">
                    <h6 class="fw-bold mb-3"><i class="bi bi-person me-2"></i>Контактні дані</h6>
                    <div class="row g-3">
                        <div class="col-sm-6">
                            <div class="info-label">Ім'я</div>
                            <div class="info-value" th:text="${request.name ?: '— не вказано —'}"></div>
                        </div>
                        <div class="col-sm-6">
                            <div class="info-label">Телефон</div>
                            <div class="info-value">
                                <a th:href="'tel:' + ${request.phone}"
                                   class="text-decoration-none" th:text="${request.phone}"></a>
                                <a th:href="'https://api.whatsapp.com/send/?phone=' + ${#strings.replace(request.phone, '+', '')}"
                                   target="_blank" class="ms-2 text-success" title="WhatsApp">
                                    <i class="bi bi-whatsapp"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Деталі запису -->
            <div class="card mt-4">
                <div class="card-body p-4">
                    <h6 class="fw-bold mb-3"><i class="bi bi-calendar-check me-2"></i>Деталі заявки</h6>
                    <div class="row g-3">
                        <div class="col-sm-6">
                            <div class="info-label">Тип заявки</div>
                            <div class="info-value" th:text="${request.requestTypeDisplayName}"></div>
                        </div>
                        <div class="col-sm-6">
                            <div class="info-label">Послуга</div>
                            <div class="info-value" th:text="${request.serviceItemName ?: '— не обрано —'}"></div>
                        </div>
                        <div class="col-sm-6">
                            <div class="info-label">Бажана дата запису</div>
                            <div class="info-value">
                                <span th:if="${request.appointmentDate}"
                                      th:text="${#temporals.format(request.appointmentDate, 'dd.MM.yyyy HH:mm')}"></span>
                                <span th:unless="${request.appointmentDate}" class="text-muted">— не вказано —</span>
                            </div>
                        </div>
                        <div class="col-sm-6">
                            <div class="info-label">Дата створення</div>
                            <div class="info-value"
                                 th:text="${#temporals.format(request.createdAt, 'dd.MM.yyyy HH:mm')}"></div>
                        </div>
                    </div>

                    <!-- Повідомлення -->
                    <div th:if="${request.message}" class="mt-3">
                        <div class="info-label">Повідомлення від клієнта</div>
                        <div class="bg-light rounded-3 p-3 mt-1" th:text="${request.message}"></div>
                    </div>
                </div>
            </div>

            <!-- Обробка -->
            <div class="card mt-4" th:if="${request.processedAt != null}">
                <div class="card-body p-4">
                    <h6 class="fw-bold mb-3"><i class="bi bi-check2-circle me-2"></i>Обробка</h6>
                    <div class="row g-3">
                        <div class="col-sm-6">
                            <div class="info-label">Дата обробки</div>
                            <div class="info-value"
                                 th:text="${#temporals.format(request.processedAt, 'dd.MM.yyyy HH:mm')}"></div>
                        </div>
                        <div class="col-sm-6">
                            <div class="info-label">Час обробки</div>
                            <div class="info-value text-success">
                                <!-- Різниця між створенням і обробкою -->
                                <span th:with="hours=${T(java.time.Duration).between(request.createdAt, request.processedAt).toHours()},
                                              mins=${T(java.time.Duration).between(request.createdAt, request.processedAt).toMinutesPart()}"
                                      th:text="${hours > 0 ? hours + ' год ' + mins + ' хв' : mins + ' хв'}"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Права колонка — дії -->
        <div class="col-lg-4">

            <!-- Зміна статусу -->
            <div class="card">
                <div class="card-body p-4">
                    <h6 class="fw-bold mb-3">Змінити статус</h6>
                    <form th:action="@{/admin/requests/{id}/status(id=${request.id})}" method="post">
                        <div class="d-grid gap-2">
                            <button th:each="s : ${statuses}"
                                    type="submit"
                                    name="status"
                                    th:value="${s}"
                                    class="btn btn-sm"
                                    th:classappend="${request.status.name() == s.name() ? 'btn-dark disabled' : 'btn-outline-secondary'}"
                                    th:disabled="${request.status.name() == s.name()}">
                                <i class="bi me-1"
                                   th:classappend="${s.name() == 'NEW' ? 'bi-envelope' :
                                                    (s.name() == 'IN_PROGRESS' ? 'bi-hourglass-split' : 'bi-check-circle')}"></i>
                                <span th:text="${s.displayName}"></span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Швидкі дії -->
            <div class="card mt-4">
                <div class="card-body p-4">
                    <h6 class="fw-bold mb-3">Швидкі дії</h6>
                    <div class="d-grid gap-2">
                        <a th:href="'tel:' + ${request.phone}" class="btn btn-outline-primary btn-sm">
                            <i class="bi bi-telephone me-1"></i> Зателефонувати
                        </a>
                        <a th:href="'https://api.whatsapp.com/send/?phone=' + ${#strings.replace(request.phone, '+', '')}"
                           target="_blank" class="btn btn-outline-success btn-sm">
                            <i class="bi bi-whatsapp me-1"></i> Написати в WhatsApp
                        </a>
                    </div>
                </div>
            </div>

            <!-- Видалити -->
            <div class="card mt-4">
                <div class="card-body p-4">
                    <form th:action="@{/admin/requests/{id}/delete(id=${request.id})}"
                          method="post"
                          onsubmit="return confirm('Ви впевнені, що хочете видалити цю заявку?')">
                        <button type="submit" class="btn btn-outline-danger btn-sm w-100">
                            <i class="bi bi-trash me-1"></i> Видалити заявку
                        </button>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
