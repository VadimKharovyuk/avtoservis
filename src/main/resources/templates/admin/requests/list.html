<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заявки | EN-motors Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .card { border: none; border-radius: .75rem; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
        .table th { font-weight: 600; font-size: .85rem; text-transform: uppercase; color: #64748b; letter-spacing: .03em; }
        .badge-new { background: #dbeafe; color: #1e40af; }
        .badge-progress { background: #fef3c7; color: #92400e; }
        .badge-done { background: #dcfce7; color: #166534; }
        .filter-btn.active { font-weight: 600; }
    </style>
</head>
<body>

<div class="container py-4">

    <!-- Flash повідомлення -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle me-1"></i> <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Заголовок -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="mb-1 fw-bold">
                Заявки
                <span th:if="${newCount > 0}" class="badge bg-danger ms-2" th:text="${newCount}"></span>
            </h4>
            <p class="text-muted mb-0" th:text="'Всього: ' + ${requests.totalElements} + ' заявок'"></p>
        </div>
        <a href="/admin" class="btn btn-light">
            <i class="bi bi-arrow-left me-1"></i> Dashboard
        </a>
    </div>

    <!-- Фільтри по статусу -->
    <div class="d-flex gap-2 mb-3">
        <a href="/admin/requests"
           class="btn btn-sm"
           th:classappend="${currentStatus == null ? 'btn-dark active' : 'btn-outline-secondary'}">
            Всі
        </a>
        <a th:each="s : ${statuses}"
           th:href="@{/admin/requests(status=${s})}"
           class="btn btn-sm"
           th:classappend="${currentStatus != null && currentStatus.name() == s.name() ? 'btn-dark active' : 'btn-outline-secondary'}">
            <span th:text="${s.displayName}"></span>
            <span th:if="${s.name() == 'NEW' && newCount > 0}"
                  class="badge bg-danger ms-1" th:text="${newCount}"></span>
        </a>
    </div>

    <!-- Таблиця -->
    <div class="card">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="bg-light">
                <tr>
                    <th style="width: 50px">ID</th>
                    <th>Клієнт</th>
                    <th>Телефон</th>
                    <th>Тип</th>
                    <th>Послуга</th>
                    <th>Запис на</th>
                    <th class="text-center">Статус</th>
                    <th>Створено</th>
                    <th class="text-end" style="width: 120px">Дії</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="req : ${requests.content}">
                    <!-- ID -->
                    <td class="text-muted small" th:text="'#' + ${req.id}"></td>

                    <!-- Клієнт -->
                    <td>
                        <span class="fw-semibold" th:text="${req.name ?: '—'}"></span>
                    </td>

                    <!-- Телефон -->
                    <td>
                        <a th:href="'tel:' + ${req.phone}" class="text-decoration-none" th:text="${req.phone}"></a>
                    </td>

                    <!-- Тип -->
                    <td>
                        <span class="small" th:text="${req.requestTypeDisplayName}"></span>
                    </td>

                    <!-- Послуга -->
                    <td>
                        <span th:if="${req.serviceItemName}" class="small" th:text="${req.serviceItemName}"></span>
                        <span th:unless="${req.serviceItemName}" class="text-muted small">—</span>
                    </td>

                    <!-- Запис на -->
                    <td>
                        <span th:if="${req.appointmentDate}"
                              class="small fw-semibold"
                              th:text="${#temporals.format(req.appointmentDate, 'dd.MM.yyyy HH:mm')}"></span>
                        <span th:unless="${req.appointmentDate}" class="text-muted small">—</span>
                    </td>

                    <!-- Статус -->
                    <td class="text-center">
                        <span class="badge"
                              th:classappend="${req.status.name() == 'NEW' ? 'badge-new' :
                                               (req.status.name() == 'IN_PROGRESS' ? 'badge-progress' : 'badge-done')}"
                              th:text="${req.statusDisplayName}"></span>
                    </td>

                    <!-- Створено -->
                    <td>
                        <span class="text-muted small"
                              th:text="${#temporals.format(req.createdAt, 'dd.MM HH:mm')}"></span>
                    </td>

                    <!-- Дії -->
                    <td class="text-end">
                        <a th:href="@{/admin/requests/{id}(id=${req.id})}"
                           class="btn btn-sm btn-outline-primary me-1" title="Деталі">
                            <i class="bi bi-eye"></i>
                        </a>
                        <form th:action="@{/admin/requests/{id}/delete(id=${req.id})}"
                              method="post" class="d-inline"
                              onsubmit="return confirm('Ви впевнені, що хочете видалити цю заявку?')">
                            <button type="submit" class="btn btn-sm btn-outline-danger" title="Видалити">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>

                <!-- Порожня таблиця -->
                <tr th:if="${#lists.isEmpty(requests.content)}">
                    <td colspan="9" class="text-center py-5 text-muted">
                        <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                        Заявок немає
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Пагінація -->
        <div class="card-footer bg-white d-flex justify-content-between align-items-center"
             th:if="${requests.totalPages > 1}">
            <small class="text-muted"
                   th:text="'Сторінка ' + (${requests.currentPage} + 1) + ' з ' + ${requests.totalPages}"></small>
            <nav>
                <ul class="pagination pagination-sm mb-0">
                    <li class="page-item" th:classappend="${!requests.hasPrevious ? 'disabled' : ''}">
                        <a class="page-link"
                           th:href="@{/admin/requests(page=${requests.currentPage - 1}, status=${currentStatus})}">
                            <i class="bi bi-chevron-left"></i>
                        </a>
                    </li>
                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(0, requests.totalPages - 1)}"
                        th:classappend="${i == requests.currentPage ? 'active' : ''}">
                        <a class="page-link"
                           th:href="@{/admin/requests(page=${i}, status=${currentStatus})}"
                           th:text="${i + 1}"></a>
                    </li>
                    <li class="page-item" th:classappend="${!requests.hasNext ? 'disabled' : ''}">
                        <a class="page-link"
                           th:href="@{/admin/requests(page=${requests.currentPage + 1}, status=${currentStatus})}">
                            <i class="bi bi-chevron-right"></i>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
