<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нова послуга | EN-motors Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .card { border: none; border-radius: .75rem; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
    </style>
</head>
<body>

<div class="container py-4">

    <!-- Flash повідомлення -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle me-1"></i> <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle me-1"></i> <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Заголовок -->
    <div class="d-flex align-items-center mb-4">
        <a href="/admin/services" class="btn btn-light me-3">
            <i class="bi bi-arrow-left"></i>
        </a>
        <h4 class="mb-0 fw-bold">Нова послуга</h4>
    </div>

    <form th:action="@{/admin/services/create}"
          th:object="${serviceItem}"
          method="post">

        <div class="row g-4">

            <!-- Ліва колонка — основні дані -->
            <div class="col-lg-8">
                <div class="card">
                    <div class="card-body p-4">
                        <h6 class="fw-bold mb-3">Основна інформація</h6>

                        <!-- Назва -->
                        <div class="mb-3">
                            <label for="name" class="form-label">Назва послуги <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="name"
                                   th:field="*{name}"
                                   th:classappend="${#fields.hasErrors('name') ? 'is-invalid' : ''}"
                                   placeholder="напр. Výměna motorového oleje">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>

                        <!-- Опис -->
                        <div class="mb-3">
                            <label for="description" class="form-label">Опис</label>
                            <textarea class="form-control" id="description"
                                      th:field="*{description}"
                                      rows="3"
                                      placeholder="Короткий опис послуги..."></textarea>
                        </div>

                        <div class="row">
                            <!-- Ціна -->
                            <div class="col-md-4 mb-3">
                                <label for="price" class="form-label">Ціна (Kč) <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <input type="number" class="form-control" id="price"
                                           th:field="*{price}"
                                           th:classappend="${#fields.hasErrors('price') ? 'is-invalid' : ''}"
                                           step="0.01" min="0"
                                           placeholder="600">
                                    <span class="input-group-text">Kč</span>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                                </div>
                            </div>

                            <!-- Категорія -->
                            <div class="col-md-4 mb-3">
                                <label for="category" class="form-label">Категорія <span class="text-danger">*</span></label>
                                <select class="form-select" id="category"
                                        th:field="*{category}"
                                        th:classappend="${#fields.hasErrors('category') ? 'is-invalid' : ''}">
                                    <option value="">— Оберіть —</option>
                                    <option th:each="cat : ${T(com.example.avtoservis.enums.ServiceCategory).values()}"
                                            th:value="${cat}"
                                            th:text="${cat.displayName}"></option>
                                </select>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></div>
                            </div>

                            <!-- Ціна "від" -->
                            <div class="col-md-4 mb-3 d-flex align-items-end">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="priceFrom"
                                           th:field="*{priceFrom}">
                                    <label class="form-check-label" for="priceFrom">
                                        Ціна від (od 800 Kč)
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- SEO блок -->
                <div class="card mt-4">
                    <div class="card-body p-4">
                        <div class="d-flex align-items-center mb-3">
                            <h6 class="fw-bold mb-0">SEO налаштування</h6>
                            <span class="badge bg-light text-muted ms-2">Необов'язково</span>
                        </div>

                        <!-- Slug -->
                        <div class="mb-3">
                            <label for="slug" class="form-label">URL slug</label>
                            <div class="input-group">
                                <span class="input-group-text text-muted">/sluzby/</span>
                                <input type="text" class="form-control" id="slug"
                                       th:field="*{slug}"
                                       placeholder="vymena-motoroveho-oleje">
                            </div>
                            <div class="form-text">Латиницею, без діакритики, дефіси замість пробілів</div>
                        </div>

                        <!-- Meta title -->
                        <div class="mb-3">
                            <label for="metaTitle" class="form-label">Meta title</label>
                            <input type="text" class="form-control" id="metaTitle"
                                   th:field="*{metaTitle}"
                                   th:classappend="${#fields.hasErrors('metaTitle') ? 'is-invalid' : ''}"
                                   maxlength="160"
                                   placeholder="Výměna oleje Brno | EN-motors">
                            <div class="d-flex justify-content-between">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('metaTitle')}" th:errors="*{metaTitle}"></div>
                                <small class="form-text text-end" id="metaTitleCount">0 / 160</small>
                            </div>
                        </div>

                        <!-- Meta description -->
                        <div class="mb-3">
                            <label for="metaDescription" class="form-label">Meta description</label>
                            <textarea class="form-control" id="metaDescription"
                                      th:field="*{metaDescription}"
                                      th:classappend="${#fields.hasErrors('metaDescription') ? 'is-invalid' : ''}"
                                      rows="2" maxlength="300"
                                      placeholder="Výměna motorového oleje a filtru v centru Brna. Opravy ihned bez objednání."></textarea>
                            <div class="d-flex justify-content-between">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('metaDescription')}" th:errors="*{metaDescription}"></div>
                                <small class="form-text text-end" id="metaDescCount">0 / 300</small>
                            </div>
                        </div>

                        <!-- Image alt -->
                        <div class="mb-0">
                            <label for="imageAlt" class="form-label">Alt текст для зображення</label>
                            <input type="text" class="form-control" id="imageAlt"
                                   th:field="*{imageAlt}"
                                   placeholder="Výměna motorového oleje v autoservisu EN-motors Brno">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Права колонка — статус та прев'ю -->
            <div class="col-lg-4">
                <div class="card">
                    <div class="card-body p-4">
                        <h6 class="fw-bold mb-3">Публікація</h6>
                        <div class="form-check form-switch mb-4">
                            <input class="form-check-input" type="checkbox" id="active"
                                   th:field="*{active}">
                            <label class="form-check-label" for="active">Активна (видима на сайті)</label>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg me-1"></i> Створити послугу
                            </button>
                            <a href="/admin/services" class="btn btn-light">Скасувати</a>
                        </div>
                    </div>
                </div>

                <!-- SEO прев'ю -->
                <div class="card mt-4">
                    <div class="card-body p-4">
                        <h6 class="fw-bold mb-3">Прев'ю у пошуку</h6>
                        <div class="border rounded p-3" style="font-family: Arial, sans-serif;">
                            <div id="previewTitle" class="text-primary" style="font-size: 18px;">
                                Назва послуги | EN-motors
                            </div>
                            <div id="previewUrl" class="text-success small">
                                en-motors.cz/sluzby/...
                            </div>
                            <div id="previewDesc" class="text-muted small mt-1">
                                Опис послуги буде тут...
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Лічильники символів
    const metaTitleEl = document.getElementById('metaTitle');
    const metaDescEl = document.getElementById('metaDescription');

    metaTitleEl.addEventListener('input', function() {
        document.getElementById('metaTitleCount').textContent = this.value.length + ' / 160';
    });
    metaDescEl.addEventListener('input', function() {
        document.getElementById('metaDescCount').textContent = this.value.length + ' / 300';
    });

    // SEO прев'ю
    const nameInput = document.getElementById('name');
    const slugInput = document.getElementById('slug');

    function updatePreview() {
        const title = metaTitleEl.value || nameInput.value || 'Назва послуги';
        document.getElementById('previewTitle').textContent = title + ' | EN-motors';
        document.getElementById('previewUrl').textContent = 'en-motors.cz/sluzby/' + (slugInput.value || '...');
        document.getElementById('previewDesc').textContent = metaDescEl.value || 'Опис послуги буде тут...';
    }

    nameInput.addEventListener('input', updatePreview);
    slugInput.addEventListener('input', updatePreview);
    metaTitleEl.addEventListener('input', updatePreview);
    metaDescEl.addEventListener('input', updatePreview);
</script>
</body>
</html>
