<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нова послуга | EN-motors Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .card { border: none; border-radius: .75rem; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
        .nav-tabs .nav-link { font-size: .9rem; }
        .nav-tabs .nav-link.active { font-weight: 600; }
        .lang-flag { font-size: 1.1rem; margin-right: .35rem; }
    </style>
</head>
<body>

<div class="container py-4">

    <!-- Flash повідомлення -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle me-1"></i> <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle me-1"></i> <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Заголовок -->
    <div class="d-flex align-items-center mb-4">
        <a href="/admin/services" class="btn btn-light me-3">
            <i class="bi bi-arrow-left"></i>
        </a>
        <h4 class="mb-0 fw-bold">Нова послуга</h4>
    </div>

    <form th:action="@{/admin/services/create}"
          th:object="${serviceItem}"
          method="post">

        <div class="row g-4">

            <!-- Ліва колонка -->
            <div class="col-lg-8">

                <!-- Основна інформація -->
                <div class="card">
                    <div class="card-body p-4">
                        <h6 class="fw-bold mb-3">Основна інформація</h6>

                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label for="price" class="form-label">Ціна (Kč) <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <input type="number" class="form-control" id="price"
                                           th:field="*{price}"
                                           th:classappend="${#fields.hasErrors('price') ? 'is-invalid' : ''}"
                                           step="0.01" min="0" placeholder="600">
                                    <span class="input-group-text">Kč</span>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                                </div>
                            </div>

                            <div class="col-md-4 mb-3">
                                <label for="category" class="form-label">Категорія <span class="text-danger">*</span></label>
                                <select class="form-select" id="category"
                                        th:field="*{category}"
                                        th:classappend="${#fields.hasErrors('category') ? 'is-invalid' : ''}">
                                    <option value="">— Оберіть —</option>
                                    <option th:each="cat : ${T(com.example.avtoservis.enums.ServiceCategory).values()}"
                                            th:value="${cat}"
                                            th:text="${cat.displayName}"></option>
                                </select>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></div>
                            </div>

                            <div class="col-md-4 mb-3 d-flex align-items-end">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="priceFrom"
                                           th:field="*{priceFrom}">
                                    <label class="form-check-label" for="priceFrom">Ціна від</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Переклади (таби) -->
                <div class="card mt-4">
                    <div class="card-body p-4">
                        <h6 class="fw-bold mb-3">Переклади</h6>

                        <!-- Таби мов -->
                        <ul class="nav nav-tabs" role="tablist">
                            <li class="nav-item" th:each="lang, iter : ${languages}">
                                <button class="nav-link"
                                        th:classappend="${iter.index == 0 ? 'active' : ''}"
                                        th:id="'tab-' + ${lang.code}"
                                        type="button" role="tab"
                                        th:attr="data-bs-toggle='tab', data-bs-target='#panel-' + ${lang.code}">
                                    <span class="lang-flag" th:text="${lang.flag}"></span>
                                    <span th:text="${lang.displayName}"></span>
                                </button>
                            </li>
                        </ul>

                        <!-- Контент табів -->
                        <div class="tab-content pt-3">
                            <div th:each="lang, iter : ${languages}"
                                 class="tab-pane fade"
                                 th:classappend="${iter.index == 0 ? 'show active' : ''}"
                                 th:id="'panel-' + ${lang.code}"
                                 role="tabpanel">

                                <!-- Прихована мова -->
                                <input type="hidden"
                                       th:name="|translations[${iter.index}].language|"
                                       th:value="${lang}">

                                <!-- Назва -->
                                <div class="mb-3">
                                    <label class="form-label">
                                        Назва <span class="text-danger">*</span>
                                        <span class="badge bg-light text-muted ms-1" th:text="${lang.code}"></span>
                                    </label>
                                    <input type="text" class="form-control"
                                           th:name="|translations[${iter.index}].name|"
                                           th:value="${serviceItem.translations[__${iter.index}__]?.name}"
                                           th:placeholder="${lang.code == 'cs' ? 'Výměna motorového oleje' :
                                                            (lang.code == 'en' ? 'Engine oil change' : 'Замена моторного масла')}">
                                </div>

                                <!-- Опис -->
                                <div class="mb-3">
                                    <label class="form-label">Опис
                                        <span class="badge bg-light text-muted ms-1" th:text="${lang.code}"></span>
                                    </label>
                                    <textarea class="form-control" rows="2"
                                              th:name="|translations[${iter.index}].description|"
                                              th:text="${serviceItem.translations[__${iter.index}__]?.description}"
                                              placeholder="Короткий опис послуги..."></textarea>
                                </div>

                                <!-- SEO -->
                                <div class="bg-light rounded-3 p-3">
                                    <div class="small fw-semibold text-muted mb-2">
                                        <i class="bi bi-search me-1"></i> SEO
                                    </div>

                                    <!-- Slug -->
                                    <div class="mb-2">
                                        <label class="form-label small">URL slug</label>
                                        <div class="input-group input-group-sm">
                                            <span class="input-group-text text-muted"
                                                  th:text="'/' + ${lang.code} + '/sluzby/'"></span>
                                            <input type="text" class="form-control"
                                                   th:name="|translations[${iter.index}].slug|"
                                                   th:value="${serviceItem.translations[__${iter.index}__]?.slug}"
                                                   th:placeholder="${lang.code == 'cs' ? 'vymena-oleje' :
                                                                    (lang.code == 'en' ? 'oil-change' : 'zamena-masla')}">
                                        </div>
                                    </div>

                                    <!-- Meta title -->
                                    <div class="mb-2">
                                        <label class="form-label small">Meta title</label>
                                        <input type="text" class="form-control form-control-sm"
                                               th:name="|translations[${iter.index}].metaTitle|"
                                               th:value="${serviceItem.translations[__${iter.index}__]?.metaTitle}"
                                               maxlength="160"
                                               th:placeholder="${lang.code == 'cs' ? 'Výměna oleje Brno | EN-motors' :
                                                                (lang.code == 'en' ? 'Oil change Brno | EN-motors' : 'Замена масла Брно | EN-motors')}">
                                    </div>

                                    <!-- Meta description -->
                                    <div class="mb-2">
                                        <label class="form-label small">Meta description</label>
                                        <textarea class="form-control form-control-sm" rows="2"
                                                  th:name="|translations[${iter.index}].metaDescription|"
                                                  th:text="${serviceItem.translations[__${iter.index}__]?.metaDescription}"
                                                  maxlength="300"
                                                  placeholder="Опис для пошукової видачі..."></textarea>
                                    </div>

                                    <!-- Image alt -->
                                    <div>
                                        <label class="form-label small">Alt текст зображення</label>
                                        <input type="text" class="form-control form-control-sm"
                                               th:name="|translations[${iter.index}].imageAlt|"
                                               th:value="${serviceItem.translations[__${iter.index}__]?.imageAlt}"
                                               placeholder="Alt текст...">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Права колонка -->
            <div class="col-lg-4">

                <!-- Публікація -->
                <div class="card">
                    <div class="card-body p-4">
                        <h6 class="fw-bold mb-3">Публікація</h6>
                        <div class="form-check form-switch mb-4">
                            <input class="form-check-input" type="checkbox" id="active"
                                   th:field="*{active}">
                            <label class="form-check-label" for="active">Активна (видима на сайті)</label>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg me-1"></i> Створити послугу
                            </button>
                            <a href="/admin/services" class="btn btn-light">Скасувати</a>
                        </div>
                    </div>
                </div>

                <!-- Підказка -->
                <div class="card mt-4">
                    <div class="card-body p-4">
                        <h6 class="fw-bold mb-2">
                            <i class="bi bi-info-circle me-1"></i> Підказка
                        </h6>
                        <ul class="small text-muted mb-0" style="padding-left: 1rem;">
                            <li class="mb-1">Ціна, категорія та фото — спільні для всіх мов</li>
                            <li class="mb-1">Назва, опис, SEO — окремі для кожної мови</li>
                            <li class="mb-1">Slug задається один раз і не змінюється</li>
                            <li>Якщо переклад не заповнений — покажеться чеська версія</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
