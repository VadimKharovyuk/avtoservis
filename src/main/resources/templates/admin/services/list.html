<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Послуги | EN-motors Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .badge-active { background: #dcfce7; color: #166534; }
        .badge-inactive { background: #fee2e2; color: #991b1b; }
        .card { border: none; border-radius: .75rem; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
        .table th { font-weight: 600; font-size: .85rem; text-transform: uppercase; color: #64748b; letter-spacing: .03em; }
        .views-cell { min-width: 90px; }
    </style>
</head>
<body>

<div class="container py-4">

    <!-- Flash повідомлення -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle me-1"></i> <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle me-1"></i> <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Заголовок -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="mb-1 fw-bold">Послуги</h4>
            <p class="text-muted mb-0" th:text="'Всього: ' + ${services.totalElements} + ' послуг'"></p>
        </div>
        <a href="/admin/services/create" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1"></i> Нова послуга
        </a>
    </div>

    <!-- Таблиця -->
    <div class="card">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="bg-light">
                <tr>
                    <th style="width: 60px">Фото</th>
                    <th>Назва</th>
                    <th>Категорія</th>
                    <th>Ціна</th>
                    <th>Slug</th>
                    <th class="text-center">Стан</th>
                    <th class="text-center views-cell">
                        <i class="bi bi-eye me-1"></i>Перегляди
                    </th>
                    <th class="text-end" style="width: 140px">Дії</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${services.content}">
                    <!-- Фото -->
                    <td>
                        <img th:if="${item.imageUrl != null}"
                             th:src="${item.imageUrl}"
                             th:alt="${item.imageAlt}"
                             class="rounded"
                             style="width: 44px; height: 44px; object-fit: cover;">
                        <div th:unless="${item.imageUrl != null}"
                             class="rounded bg-light d-flex align-items-center justify-content-center"
                             style="width: 44px; height: 44px;">
                            <i class="bi bi-image text-muted"></i>
                        </div>
                    </td>
                    <!-- Назва -->
                    <td>
                        <div class="fw-semibold" th:text="${item.name}"></div>
                        <small class="text-muted" th:if="${item.description}"
                               th:text="${#strings.abbreviate(item.description, 50)}"></small>
                    </td>
                    <!-- Категорія -->
                    <td>
                        <span class="badge rounded-pill"
                              th:classappend="${item.category.name() == 'AUTO_SERVICE' ? 'bg-primary-subtle text-primary' : 'bg-warning-subtle text-warning'}"
                              th:text="${item.categoryDisplayName}"></span>
                    </td>
                    <!-- Ціна -->
                    <td>
                        <span th:if="${item.priceFrom}" class="text-muted">від </span>
                        <span class="fw-semibold" th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')}"></span>
                        <span class="text-muted">Kč</span>
                    </td>
                    <!-- Slug -->
                    <td>
                        <code class="small" th:text="${item.slug}" th:if="${item.slug}"></code>
                        <span class="text-muted small" th:unless="${item.slug}">—</span>
                    </td>
                    <!-- Стан -->
                    <td class="text-center">
                        <span th:if="${item.active}" class="badge badge-active">Активна</span>
                        <span th:unless="${item.active}" class="badge badge-inactive">Неактивна</span>
                    </td>
                    <!-- Перегляди -->
                    <td class="text-center views-cell">
                        <span class="d-inline-flex align-items-center gap-1">
                            <i class="bi bi-eye text-muted"></i>
                            <span th:text="${item.views}" class="fw-semibold"></span>
                        </span>
                    </td>
                    <!-- Дії -->
                    <td class="text-end">
                        <a th:href="@{/admin/services/edit/{id}(id=${item.id})}"
                           class="btn btn-sm btn-outline-primary me-1" title="Редагувати">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <form th:action="@{/admin/services/delete/{id}(id=${item.id})}"
                              method="post" class="d-inline"
                              onsubmit="return confirm('Ви впевнені, що хочете видалити цю послугу?')">
                            <button type="submit" class="btn btn-sm btn-outline-danger" title="Видалити">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>

                <!-- Порожня таблиця -->
                <tr th:if="${#lists.isEmpty(services.content)}">
                    <td colspan="8" class="text-center py-5 text-muted">
                        <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                        Послуг немає. Створіть першу послугу.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Пагінація -->
        <div class="card-footer bg-white d-flex justify-content-between align-items-center"
             th:if="${services.totalPages > 1}">
            <small class="text-muted"
                   th:text="'Сторінка ' + (${services.currentPage} + 1) + ' з ' + ${services.totalPages}"></small>
            <nav>
                <ul class="pagination pagination-sm mb-0">
                    <li class="page-item" th:classappend="${!services.hasPrevious ? 'disabled' : ''}">
                        <a class="page-link"
                           th:href="@{/admin/services(page=${services.currentPage - 1})}">
                            <i class="bi bi-chevron-left"></i>
                        </a>
                    </li>
                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(0, services.totalPages - 1)}"
                        th:classappend="${i == services.currentPage ? 'active' : ''}">
                        <a class="page-link"
                           th:href="@{/admin/services(page=${i})}"
                           th:text="${i + 1}"></a>
                    </li>
                    <li class="page-item" th:classappend="${!services.hasNext ? 'disabled' : ''}">
                        <a class="page-link"
                           th:href="@{/admin/services(page=${services.currentPage + 1})}">
                            <i class="bi bi-chevron-right"></i>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
