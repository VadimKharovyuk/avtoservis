<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${currentLang.code}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EN-motors | Autoservis Brno</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        .lang-switcher .btn { font-size: .85rem; padding: .25rem .6rem; }
        .lang-switcher .btn.active { font-weight: 600; }
    </style>
</head>
<body>

<!-- Навігація -->
<nav class="navbar navbar-light bg-white border-bottom">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand fw-bold" th:href="@{/{lang}(lang=${currentLang.code})}">
            EN-motors
        </a>

        <!-- Перемикач мов -->
        <div class="lang-switcher d-flex gap-1">
            <a th:each="lang : ${languages}"
               th:href="@{/{code}(code=${lang.code})}"
               class="btn btn-sm"
               th:classappend="${lang == currentLang ? 'btn-dark active' : 'btn-outline-secondary'}"
               th:text="${lang.flag} + ' ' + ${lang.code.toUpperCase()}">
            </a>
        </div>
    </div>
</nav>

<div class="container py-5">

    <!-- Flash повідомлення -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show mb-4">
        <i class="bi bi-check-circle me-1"></i> <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <h1 class="mb-2">EN-motors</h1>
    <p class="text-muted mb-5">Servis a opravy vozů v centru Brna</p>

    <h4 class="mb-3">Naše služby</h4>

    <div class="row g-3" th:if="${!#lists.isEmpty(items)}">
        <div class="col-md-4" th:each="item : ${items}">
            <div class="card h-100">
                <img th:if="${item.imageUrl != null}"
                     th:src="${item.imageUrl}"
                     th:alt="${item.imageAlt}"
                     class="card-img-top" style="height: 180px; object-fit: cover;">
                <div class="card-body d-flex flex-column">
                    <h6 class="fw-bold" th:text="${item.name}"></h6>
                    <p class="text-muted small mb-2" th:if="${item.description}" th:text="${item.description}"></p>
                    <span class="fw-bold mb-3">
                        <span th:if="${item.priceFrom}">od </span>
                        <span th:text="${item.price}"></span> Kč
                    </span>
                    <div class="mt-auto d-flex gap-2">
                        <a th:href="@{/{lang}/sluzby/{slug}(lang=${currentLang.code}, slug=${item.slug})}"
                           class="btn btn-outline-primary btn-sm flex-fill">
                            <i class="bi bi-info-circle me-1"></i> Podrobnosti
                        </a>
                        <a th:href="@{/objednat(service=${item.id})}"
                           class="btn btn-primary btn-sm flex-fill">
                            <i class="bi bi-calendar-check me-1"></i> Objednat
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <p th:if="${#lists.isEmpty(items)}" class="text-muted">Zatím žádné služby.</p>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
