<!DOCTYPE html>
<html lang="cs" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EN-motors | Autoservis Brno</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>

<div class="container py-5">
    <h1 class="mb-2">EN-motors</h1>
    <p class="text-muted mb-5">Servis a opravy vozů v centru Brna</p>

    <h4 class="mb-3">Naše služby</h4>

    <div class="row g-3" th:if="${!#lists.isEmpty(items)}">
        <div class="col-md-4" th:each="item : ${items}">
            <div class="card h-100">
                <img th:if="${item.imageUrl != null}"
                     th:src="${item.imageUrl}"
                     th:alt="${item.imageAlt}"
                     class="card-img-top" style="height: 180px; object-fit: cover;">
                <div class="card-body d-flex flex-column">
                    <h6 class="fw-bold" th:text="${item.name}"></h6>
                    <p class="text-muted small mb-2" th:if="${item.description}" th:text="${item.description}"></p>
                    <span class="fw-bold mb-3">
                        <span th:if="${item.priceFrom}">od </span>
                        <span th:text="${item.price}"></span> Kč
                    </span>
                    <div class="mt-auto d-flex gap-2">
                        <a th:href="@{/sluzby/{slug}(slug=${item.slug})}"
                           class="btn btn-outline-primary btn-sm flex-fill">
                            <i class="bi bi-info-circle me-1"></i> Podrobnosti
                        </a>
                        <a th:href="@{/objednat(service=${item.id})}"
                           class="btn btn-primary btn-sm flex-fill">
                            <i class="bi bi-calendar-check me-1"></i> Objednat
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <p th:if="${#lists.isEmpty(items)}" class="text-muted">Zatím žádné služby.</p>

    <!-- Flash повідомлення після запису -->
    <div th:if="${success}" class="alert alert-success mt-4 alert-dismissible fade show">
        <i class="bi bi-check-circle me-1"></i> <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
